  <text x="490" y="234" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="7">Clinic B</text>
  <text x="540" y="234" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="7">Clinic C</text>
