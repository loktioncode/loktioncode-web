  <rect x="436" y="112" width="118" height="6" rx="2" fill="#34d399" opacity="0.5"/>
  <rect x="436" y="122" width="90" height="6" rx="2" fill="#10b981" opacity="0.4"/>
  <rect x="436" y="132" width="104" height="6" rx="2" fill="#34d399" opacity="0.35"/>
